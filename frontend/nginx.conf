server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets - serve with correct MIME types, 404 if missing
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot|otf|mp4|webm|avif)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
        try_files $uri =404;
    }

    # JS / CSS with longer cache
    location ~* \.(js|css)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
        try_files $uri =404;
    }

    # SPA fallback - HTML only
    location / {
        try_files $uri $uri/ /index.html;
    }
}